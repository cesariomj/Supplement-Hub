<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplement Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // Enable Tailwind dark mode
    tailwind.config = {
        darkMode: 'class'
    };
</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .fixed.inset-0 { background-color: rgba(0, 0, 0, 0.95) !important; }
        
        .tab-button { transition: all 0.2s; }
        .tab-button.active {
            border-bottom: 3px solid #10b981;
            color: #10b981;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- GOOGLE LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center hidden">
        <div class="bg-white dark:bg-slate-800 rounded-3xl p-10 max-w-md w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-emerald-600 rounded-3xl flex items-center justify-center text-5xl mx-auto mb-6">💊</div>
            <h1 class="text-4xl font-semibold mb-2">Supplement Hub</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-10">Sign in to sync your data across devices</p>
            
            <button onclick="signInWithGoogle()" 
                    class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 dark:bg-slate-700 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 py-4 px-6 rounded-2xl text-lg font-medium">
                <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" width="24" height="24" alt="Google">
                Sign in with Google
            </button>
            
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-8">
                Your data stays private and syncs securely
            </p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="max-w-7xl mx-auto p-6">

        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-600 rounded-3xl flex items-center justify-center text-3xl">💊</div>
                <div>
                    <h1 class="text-4xl font-semibold tracking-tight">Supplement Hub</h1>
                    <p class="text-slate-500 dark:text-slate-400 flex items-center gap-2">
                        Real Data Entry 
                        <span class="text-xs bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded-full font-mono">real-data-01</span>
                    </p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="exportData()" class="px-5 py-3 border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-3xl text-sm font-medium">Export</button>
                <button onclick="importData()" class="px-5 py-3 border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-3xl text-sm font-medium">Import</button>
                
                <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center text-2xl hover:bg-slate-200 dark:hover:bg-slate-800 rounded-2xl transition-all">
                    <span id="theme-icon">☀️</span>
                </button>
                
                <button onclick="installApp()" id="install-button" class="hidden px-6 py-3 bg-slate-800 dark:bg-white dark:text-slate-900 text-white rounded-3xl text-sm font-medium hover:bg-slate-700 transition-all">
                    📲 Install App
                </button>
            </div>
        </div>

        <!-- Tab Buttons -->
        <div class="flex border-b border-slate-300 dark:border-slate-700 mb-8">
            <button onclick="switchTab(0)" class="tab-button active px-8 py-4">Bottles</button>
            <button onclick="switchTab(1)" class="tab-button px-8 py-4">Weekly Planner</button>
            <button onclick="switchTab(2)" class="tab-button px-8 py-4">Over Limits</button>
            <button onclick="switchTab(3)" class="tab-button px-8 py-4">Shopping</button>
        </div>

        <!-- Tab Contents -->
        <div id="bottles-content" class="tab-content active"></div>
        <div id="planner-content" class="tab-content"></div>
        <div id="overlimits-content" class="tab-content"></div>
        <div id="shopping-content" class="tab-content"></div>

    </div>
    <!-- Scripts -->

    <!-- Our code -->
    <script src="firebase.js"></script>
    <script src="app.js"></script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <!-- Our files -->
    <script src="firebase.js"></script>
    <script src="app.js"></script>

    <!-- Tab files -->
    <script src="bottles.js"></script>
    <script src="planner.js"></script>
    <script src="overlimits.js"></script>
    <script src="shopping.js"></script>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `position:fixed;bottom:24px;right:24px;padding:16px 24px;border-radius:16px;color:white;font-weight:500;z-index:9999;${type==='error'?'background:#ef4444':'background:#10b981'};`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
        }
    </script>

</body>
</html>
